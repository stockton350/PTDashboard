  h += `<div class="flashcard-nav" style="margin-top:10px">
    <button class="fc-nav-btn" onclick="phonicsNav(-1)" ${idx===0?'disabled':''}>◀</button>
    <span class="flashcard-progress">${idx+1} / ${items.length}</span>
    <button class="fc-nav-btn" onclick="phonicsNav(1)" ${idx>=items.length-1?'disabled':''}>▶</button>
  </div>`;
  return h;
}

function phonicsNav(dir) {
  const act = activities[currentAct];
  const items = act.items || [];
  currentItem = Math.max(0, Math.min(items.length - 1, currentItem + dir));
  renderCurrentActivity();
}

// ─── SPEAKING ───
function renderSpeakingItems(act, items) {
  let h = '';
  items.forEach((item, idx) => {
    if (item.type !== 'speaking') return;
    h += `<div class="speaking-card" style="margin-bottom:12px">`;
    h += `<div class="speaking-prompt-text">${item.number ? item.number+'. ' : ''}${escHtml(item.prompt)}</div>`;

    if (item.model_dialogue && item.model_dialogue.length) {
      h += `<div class="model-dialogue">`;
      item.model_dialogue.forEach(line => {
        h += `<div class="dialogue-line">
          <div class="dialogue-speaker">${escHtml(line.speaker_label)}</div>
          <div class="dialogue-text">${escHtml(line.text)}</div>
        </div>`;
      });
      h += `</div>`;
    }

    if (item.sub_prompts && item.sub_prompts.length) {
      h += `<ul class="sub-prompts">${item.sub_prompts.map(p=>`<li>${escHtml(p)}</li>`).join('')}</ul>`;
    }

    if (item.useful_language && item.useful_language.length) {
      h += `<div style="font-size:0.78rem;font-weight:700;color:#7C3AED;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em">Useful Language</div>`;
      h += `<div class="useful-lang">${item.useful_language.map(l=>`<span class="useful-chip">${escHtml(l)}</span>`).join('')}</div>`;
    }

    if (item.self_assessment_criteria && item.self_assessment_criteria.length) {
      h += `<div class="self-assess-section">Self-Check</div>`;
      h += `<div class="self-assess">`;
      item.self_assessment_criteria.forEach((c, ci) => {
        const checked = itemStates[item.id] && itemStates[item.id]['check'+ci];
        h += `<label class="self-assess-item" onclick="toggleSACheck('${item.id}',${ci})">
          <div class="sa-check ${checked?'checked':''}">${checked?'<span style="color:#fff;font-size:0.85rem">✓</span>':''}</div>
          <span>${escHtml(c)}</span>
        </label>`;
      });
      h += `</div>`;
    }
    h += `</div>`;
  });
  return h;
}

function toggleSACheck(itemId, ci) {
  const state = itemStates[itemId] || {};
  state['check'+ci] = !state['check'+ci];
  itemStates[itemId] = state;
  // Update just the checkbox
  const checkEl = document.querySelectorAll(`[onclick="toggleSACheck('${itemId}',${ci})"] .sa-check`);
  checkEl.forEach(el => {
    el.classList.toggle('checked', !!state['check'+ci]);
    el.innerHTML = state['check'+ci] ? '<span style="color:#fff;font-size:0.85rem">✓</span>' : '';
  });
}

// ─── WRITING ───
function renderWritingItems(act, items) {
  let h = '';
  items.forEach(item => {
    if (item.type !== 'writing') return;
    const state = itemStates[item.id] || {};
    h += `<div style="margin-bottom:14px">`;
    h += `<div class="writing-prompt-text">${escHtml(item.prompt)}</div>`;
    if (item.scaffolding && item.scaffolding.length) {
      h += `<div class="writing-scaffolding">${item.scaffolding.map(s=>`<span class="scaffold-chip">${escHtml(s)}</span>`).join('')}</div>`;
    }
    if (item.word_limit_min || item.word_limit_max) {
      h += `<div style="font-size:0.78rem;color:var(--text-mid);margin-bottom:6px">Word limit: ${item.word_limit_min||0}–${item.word_limit_max||'∞'} words</div>`;
    }
    h += `<textarea class="writing-textarea" id="writing-${item.id}" rows="${item.line_count||4}"
      placeholder="Write your answer here..."
      oninput="updateWritingWordCount('${item.id}',this)">${escHtml(state.text||'')}</textarea>`;
    h += `<div class="word-count" id="wc-${item.id}">0 words</div>`;

    if (state.submitted && item.model_answer) {
      h += `<div class="model-answer-reveal">
        <button class="model-answer-toggle" onclick="toggleModelAnswer('${item.id}')">
          <span>💡 Sample answer</span><span id="ma-toggle-icon-${item.id}">▼</span>
        </button>
        <div class="model-answer-body" id="ma-body-${item.id}" style="display:none">${escHtml(item.model_answer)}</div>
      </div>`;
    }
    h += `</div>`;
  });
  return h;
}

function updateWritingWordCount(itemId, el) {
  const words = el.value.trim() ? el.value.trim().split(/\s+/).length : 0;
  const wc = document.getElementById('wc-' + itemId);
  if (wc) wc.textContent = words + ' word' + (words !== 1 ? 's' : '');
  const state = itemStates[itemId] || {};
  itemStates[itemId] = {...state, text: el.value};
}

function toggleModelAnswer(itemId) {
  const body = document.getElementById('ma-body-' + itemId);
  const icon = document.getElementById('ma-toggle-icon-' + itemId);
  if (body) { const hidden = body.style.display === 'none'; body.style.display = hidden ? 'block' : 'none'; if(icon) icon.textContent = hidden ? '▲' : '▼'; }
}

// ─── COMPREHENSION ───
function renderComprehensionItems(act, items) {
  const idx = currentItem;
  const item = items[idx];
  if (!item || item.type !== 'comprehension') return '';
  const state = itemStates[item.id] || {};
  const answered = state.answered;

  let h = `<div class="item-counter">Question ${idx+1} of ${items.length}</div>`;
  h += `<div class="mc-question">${item.number ? item.number+'. ' : ''}${escHtml(item.question)}</div>`;

  if (item.answer_type === 'true_false') {
    h += `<div class="tf-buttons">`;
    ['True','False'].forEach(tf => {
      const optId = item.options ? (item.options.find(o=>o.text===tf)||{id:tf.toLowerCase()}).id : tf.toLowerCase();
      const isCorrect = item.model_answer && item.model_answer.toLowerCase() === tf.toLowerCase();
      let cls = 'tf-btn';
      if (answered) {
        if (isCorrect) cls += ' correct';
        else if (state.selectedId === optId) cls += ' incorrect';
      } else if (state.selectedId === optId) cls += ' selected';
      h += `<button class="${cls}" onclick="selectTF('${item.id}','${optId}','${tf}')" ${answered?'disabled':''}>
        ${tf === 'True' ? '✓' : '✗'}<span>${tf.toUpperCase()}</span>
      </button>`;
    });
    h += `</div>`;
  } else if (item.answer_type === 'multiple_choice' && item.options) {
    h += `<div class="options-list">`;
    item.options.forEach(opt => {
      let cls = 'option-btn';
      let icon = String.fromCharCode(65 + item.options.indexOf(opt));
      if (answered) {
        if (opt.id === item.correct_option_id) { cls += ' correct'; icon = '✓'; }
        else if (opt.id === state.selectedId) { cls += ' incorrect'; icon = '✗'; }
      } else if (opt.id === state.selectedId) cls += ' selected';
      h += `<button class="${cls}" onclick="selectComprehensionMC('${item.id}','${opt.id}')" ${answered?'disabled':''}>
        <span class="option-icon">${icon}</span>${escHtml(opt.text)}
      </button>`;
    });
    h += `</div>`;
  } else {
    // short answer
    h += `<textarea class="short-answer-area" id="sa-${item.id}" placeholder="Write your answer..."
      oninput="updateSAValue('${item.id}',this.value)">${escHtml(state.text||'')}</textarea>`;
    if (answered && item.model_answer) {
      h += `<div class="model-answer-reveal">
        <button class="model-answer-toggle" onclick="toggleModelAnswer('model-${item.id}')">
          <span>💡 Model answer</span><span id="ma-toggle-icon-model-${item.id}">▼</span>
        </button>
        <div class="model-answer-body" id="ma-body-model-${item.id}" style="display:none">${escHtml(item.model_answer)}</div>
      </div>`;
    }
  }

  if (item.hint && act.app && act.app.allow_hint && !answered) {
    if (state.hintShown) h += `<div class="hint-text">💡 ${escHtml(item.hint)}</div>`;
    else h += `<button class="hint-btn" onclick="showCompHint('${item.id}','${escHtml(item.hint).replace(/'/g,"\\'")}')">💡 Hint</button>`;
  }
  return h;
}

function selectTF(itemId, optId, tf) {
  const state = itemStates[itemId] || {};
  if (state.answered) return;
  itemStates[itemId] = {...state, selectedId: optId, selectedText: tf};
  updateActionButton(activities[currentAct]);
  renderCurrentActivity();
}

function selectComprehensionMC(itemId, optId) {
  const state = itemStates[itemId] || {};
  if (state.answered) return;
  itemStates[itemId] = {...state, selectedId: optId};
  updateActionButton(activities[currentAct]);
  renderCurrentActivity();
}

function updateSAValue(itemId, val) {
  const state = itemStates[itemId] || {};
  itemStates[itemId] = {...state, text: val};
  updateActionButton(activities[currentAct]);
}

function showCompHint(itemId, hint) {
  const state = itemStates[itemId] || {};
  itemStates[itemId] = {...state, hintShown: true};
  renderCurrentActivity();
}

function checkComprehension() {
  const act = activities[currentAct];
  const item = (act.items||[])[currentItem];
  if (!item || item.type !== 'comprehension') return;
  const state = itemStates[item.id] || {};
  if (state.answered) return;

  const pts = act.app ? (act.app.points || 0) / (act.items||[]).length : 0;

  if (item.answer_type === 'short_answer') {
    // Self-assessed
    itemStates[item.id] = {...state, answered: true, correct: true};
    scores[act.id].earned += Math.round(pts);
    showToast(true, '✅ Saved!', 'Compare your answer to the model below.');
  } else {
    const correct = state.selectedId === item.correct_option_id;
    if (correct) scores[act.id].earned += Math.round(pts);
    itemStates[item.id] = {...state, answered: true, correct};
    // Feedback
    const opt = item.options ? item.options.find(o=>o.id===state.selectedId) : null;
    let fb = '';
    if (opt && opt.feedback) fb = correct ? opt.feedback.correct : opt.feedback.incorrect;
    showToast(correct, correct ? '✅ Correct!' : '❌ Not quite!', fb);
  }

  document.getElementById('action-btn').textContent = 'Next →';
  updateHeader();
  renderCurrentActivity();
}

// ─── RANKING ───
function renderRankingItems(act, items) {
  if (!rankingState[act.id]) rankingState[act.id] = items.map((_,i)=>i);
  const order = rankingState[act.id];
  const state = itemStates[act.id] || {};
  const checked = state.checked;

  let h = `<div class="ranking-list" id="ranking-list-${act.id}">`;
  order.forEach((origIdx, pos) => {
    const item = items[origIdx];
    h += `<div class="ranking-item">
      <div class="rank-number">${pos+1}</div>
      <div class="rank-text">${escHtml(item.text)}
        ${checked && item.suggested_rank ? `<span class="suggested-badge">Suggested: #${item.suggested_rank}</span>` : ''}
        ${checked && item.rationale ? `<div class="rank-rationale">${escHtml(item.rationale)}</div>` : ''}
      </div>
      <div class="rank-controls">
        <button class="rank-btn" onclick="moveRankItem('${act.id}',${pos},-1,${items.length})" ${pos===0?'disabled':''}${checked?'disabled':''}>▲</button>
        <button class="rank-btn" onclick="moveRankItem('${act.id}',${pos},1,${items.length})" ${pos===order.length-1?'disabled':''}${checked?'disabled':''}>▼</button>
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

function moveRankItem(actId, pos, dir, len) {
  const order = rankingState[actId] || [];
  const newPos = pos + dir;
  if (newPos < 0 || newPos >= len) return;
  const newOrder = [...order];
  [newOrder[pos], newOrder[newPos]] = [newOrder[newPos], newOrder[pos]];
  rankingState[actId] = newOrder;
  renderCurrentActivity();
}

function checkRanking() {
  const act = activities[currentAct];
  itemStates[act.id] = { checked: true };
  scores[act.id].earned = act.app ? act.app.points : 0; // award full pts for completing
  showToast(true, '✅ Done! See suggested ranking below.', 'Rankings are personal — all thoughtful answers are valid!');
  document.getElementById('action-btn').textContent = 'Next →';
  updateHeader();
  renderCurrentActivity();
}

// ─── MATCHING ───
function renderMatchingItems(act, items) {
  if (!matchingState[act.id]) {
    const rights = items.map((item, i) => ({text: item.right.text || item.right.definition || '', origIdx: i}));
    // Shuffle
    for (let i = rights.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [rights[i],rights[j]]=[rights[j],rights[i]]; }
    matchingState[act.id] = { rights, matched: {}, selectedLeft: null, selectedRight: null };
  }
  const ms = matchingState[act.id];
  const checked = ms.checked;

  let h = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">`;
  h += `<div class="matching-col-header">A</div><div class="matching-col-header">B</div>`;

  items.forEach((item, i) => {
    const leftLetter = String.fromCharCode(65 + i);
    const rightItem = ms.rights[i];
    const rightNum = i + 1;
    const leftMatched = ms.matched[i] !== undefined;
    const rightMatchedIdx = Object.values(ms.matched).indexOf(i);
    const leftCorrect = checked && leftMatched && ms.matched[i] === i;
    const leftIncorrect = checked && leftMatched && ms.matched[i] !== i;
    const rightIsMatched = rightMatchedIdx >= 0;

    const leftCls = `match-item${ms.selectedLeft===i?' selected':''}${leftCorrect?' matched-correct':leftIncorrect?' matched-incorrect':''}`;
    const rightCls = `match-item${ms.selectedRight===i?' selected':''}${checked && rightIsMatched && rightMatchedIdx===rightItem.origIdx?' matched-correct':checked && rightIsMatched?' matched-incorrect':''}`;

    h += `<div>
      <div class="match-label">${leftLetter}</div>
      <div class="${leftCls}" onclick="selectMatchLeft(${i})">${escHtml(item.left.emoji||'')} ${escHtml(item.left.text||'')}</div>
    </div>`;
    h += `<div>
      <div class="match-label">${rightNum}</div>
      <div class="${rightCls}" onclick="selectMatchRight(${i})">${escHtml(rightItem.text)}</div>
    </div>`;
  });
  h += `</div>`;
  if (ms.selectedLeft !== null && ms.selectedRight === null) {
    h += `<div style="font-size:0.82rem;color:var(--text-mid);text-align:center;margin-top:8px">Now select a match from the right column</div>`;
  }
  return h;
}

function selectMatchLeft(idx) {
  const act = activities[currentAct];
  const ms = matchingState[act.id];
  if (ms.checked) return;
  ms.selectedLeft = idx;
  tryMatchConnect(act);
  renderCurrentActivity();
}

function selectMatchRight(idx) {
  const act = activities[currentAct];
  const ms = matchingState[act.id];
  if (ms.checked) return;
  ms.selectedRight = idx;
  tryMatchConnect(act);
  renderCurrentActivity();
}

function tryMatchConnect(act) {
  const ms = matchingState[act.id];
  if (ms.selectedLeft !== null && ms.selectedRight !== null) {
    ms.matched[ms.selectedLeft] = ms.selectedRight;
    ms.selectedLeft = null;
    ms.selectedRight = null;
    updateActionButton(act);
  }
}

function checkMatching() {
  const act = activities[currentAct];
  const ms = matchingState[act.id];
  const items = act.items || [];
  ms.checked = true;
  let correct = 0;
  items.forEach((item, i) => {
    const matched = ms.matched[i];
    const rightItem = ms.rights[matched];
    if (rightItem && rightItem.origIdx === i) correct++;
  });
  const pts = act.app ? act.app.points : 0;
  const earned = Math.round(pts * (correct / items.length));
  scores[act.id].earned = earned;
  showToast(correct === items.length, correct === items.length ? '✅ Perfect match!' : `✅ ${correct}/${items.length} correct!`, 'Check which pairs are highlighted.');
  document.getElementById('action-btn').textContent = 'Next →';
  updateHeader();
  renderCurrentActivity();
}

// ─── LISTENING ───
function renderListeningItems(act, items) {
  let h = `<div class="listening-note">🎧 Audio coming soon — see your teacher for this activity. The table below shows what to listen for.</div>`;
  const cols = items[0] && items[0].columns ? items[0].columns : [];
  h += `<table class="listening-table"><thead><tr><th>Speaker</th>`;
  cols.forEach(c => h += `<th>${escHtml(c.label)}</th>`);
  h += `</tr></thead><tbody>`;
  items.forEach(row => {
    h += `<tr><td class="row-label">${escHtml(row.row_label)}</td>`;
    (row.columns||[]).forEach(c => { h += `<td style="color:var(--text-mid)">${c.is_student_fill ? '...' : escHtml(c.answer||'')}</td>`; });
    h += `</tr>`;
  });
  h += `</tbody></table>`;
  return h;
}

// ─── DRAWING ───
function renderDrawingItems(act, items) {
  let h = '';
  items.forEach(item => {
    if (item.type === 'drawing') {
      h += `<div class="drawing-box">🎨 Draw your answer in class</div>`;
      if (item.writing_prompts) {
        item.writing_prompts.forEach(wp => {
          h += `<div style="font-size:0.9rem;color:var(--text-mid);margin-bottom:8px">${escHtml(wp.template)}</div>`;
          h += `<textarea class="writing-textarea" rows="${wp.line_count||1}" placeholder="${escHtml(wp.template)}" style="min-height:50px;margin-bottom:8px"></textarea>`;
        });
      }
    } else if (item.type === 'writing') {
      h += renderWritingItems(act, [item]);
    }
  });
  return h;
}

// ─── GENERIC ───
function renderGenericItems(act, items) {
  return `<div style="color:var(--text-mid);font-size:0.9rem;padding:12px 0">${items.length} item(s) — activity type: ${act.type}</div>`;
}

// ═══════════════════════════════════════════════════════
// ACTION BUTTON
// ═══════════════════════════════════════════════════════
function updateActionButton(act) {
  const btn = document.getElementById('action-btn');
  if (!btn) return;
  btn.className = '';
  const items = act.items || [];
  const item = items[currentItem];

  switch(act.type) {
    case 'vocabulary_presentation':
      btn.textContent = currentItem < items.length - 1 ? 'Next Word →' : 'All Done →';
      btn.disabled = false;
      break;
    case 'multiple_choice': {
      const state = item ? (itemStates[item.id]||{}) : {};
      if (state.answered) { btn.textContent = 'Next →'; btn.disabled = false; }
      else { btn.textContent = 'Check ✓'; btn.disabled = !state.selectedId; }
      break;
    }
    case 'fill_in_blank': {
      const state = item ? (itemStates[item.id]||{}) : {};
      if (state.answered) { btn.textContent = 'Next →'; btn.disabled = false; }
      else {
        const vals = state.values || [];
        const hasVal = (act.items||[])[currentItem] && ((act.items||[])[currentItem].blanks||[]).every((_,bi)=>vals[bi] && vals[bi].trim());
        btn.textContent = 'Check ✓'; btn.disabled = !hasVal;
      }
      break;
    }
    case 'grammar_presentation':
      btn.textContent = 'Got it →'; btn.disabled = false; break;
    case 'phonics_drill':
      btn.textContent = currentItem < items.length - 1 ? 'Next Word →' : 'Done →';
      btn.disabled = false; break;
    case 'speaking_prompt': case 'role_play':
      btn.textContent = 'Done ✓'; btn.disabled = false; break;
    case 'writing_prompt':
      btn.textContent = 'Submit →'; btn.disabled = false; break;
    case 'reading_comprehension': case 'dialogue_comprehension': {
      const state = item ? (itemStates[item.id]||{}) : {};
      if (state.answered) { btn.textContent = 'Next →'; btn.disabled = false; }
      else if (item && item.answer_type === 'short_answer') {
        btn.textContent = 'Check ✓'; btn.disabled = !(state.text && state.text.trim());
      } else {
        btn.textContent = 'Check ✓'; btn.disabled = !state.selectedId;
      }
      break;
    }
    case 'ranking': {
      const state = itemStates[act.id] || {};
      if (state.checked) { btn.textContent = 'Next →'; btn.disabled = false; }
      else { btn.textContent = 'Check ✓'; btn.disabled = false; }
      break;
    }
    case 'matching': {
      const ms = matchingState[act.id];
      if (!ms) { btn.textContent = 'Check ✓'; btn.disabled = true; break; }
      if (ms.checked) { btn.textContent = 'Next →'; btn.disabled = false; }
      else { btn.textContent = 'Check ✓'; btn.disabled = Object.keys(ms.matched).length < (act.items||[]).length; }
      break;
    }
    case 'listening_task':
      btn.textContent = 'Got it →'; btn.disabled = false; break;
    default:
      btn.textContent = 'Next →'; btn.disabled = false;
  }
}

function handleAction() {
  const act = activities[currentAct];
  if (!act) return;
  const items = act.items || [];
  const item = items[currentItem];
  const state = item ? (itemStates[item.id]||{}) : {};

  switch(act.type) {
    case 'vocabulary_presentation':
      vocabGotIt(); return;
    case 'multiple_choice':
      if (state.answered) { advanceItem(act); } else { checkMC(); } return;
    case 'fill_in_blank':
      if (state.answered) { advanceItem(act); } else { checkFillBlank(); } return;
    case 'grammar_presentation':
      advanceActivity(); return;
    case 'phonics_drill':
      if (currentItem < items.length - 1) { currentItem++; renderCurrentActivity(); }
      else { scores[act.id].earned = act.app ? act.app.points : 0; advanceActivity(); }
      return;
    case 'speaking_prompt': case 'role_play':
      scores[act.id].earned = act.app ? act.app.points : 0;
      advanceActivity(); return;
    case 'writing_prompt':
      items.forEach(i => { const s = itemStates[i.id]||{}; itemStates[i.id] = {...s, submitted:true}; });
      scores[act.id].earned = act.app ? act.app.points : 0;
      advanceActivity(); return;
    case 'reading_comprehension': case 'dialogue_comprehension':
      if (state.answered) { advanceItem(act); } else { checkComprehension(); } return;
    case 'ranking':
      if ((itemStates[act.id]||{}).checked) { advanceActivity(); } else { checkRanking(); } return;
    case 'matching':
      if (matchingState[act.id] && matchingState[act.id].checked) { advanceActivity(); } else { checkMatching(); } return;
    case 'listening_task':
      advanceActivity(); return;
    default:
      advanceActivity(); return;
  }
}

function advanceItem(act) {
  const items = act.items || [];
  if (currentItem < items.length - 1) {
    currentItem++;
    renderCurrentActivity();
  } else {
    showActivityComplete(act);
  }
}

function advanceActivity() {
  showActivityComplete(activities[currentAct]);
}

// ═══════════════════════════════════════════════════════
// ACTIVITY COMPLETE
// ═══════════════════════════════════════════════════════
function showActivityComplete(act) {
  const score = scores[act.id] || {earned:0, max:0};
  const pct = score.max ? Math.round((score.earned / score.max) * 100) : 0;
  const ca = document.getElementById('content-area');
  ca.scrollTop = 0;

  const html = `<div class="activity-complete">
    <div class="complete-star">⭐</div>
    <div class="complete-title">Activity Complete!</div>
    <div class="complete-score">${score.earned} / ${score.max}</div>
    <div class="complete-sub">${pct}% scored</div>
    <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    <div style="font-size:0.85rem;color:var(--text-mid)">${getEncouragement(pct)}</div>
  </div>`;
  ca.innerHTML = html;

  const btn = document.getElementById('action-btn');
  btn.textContent = currentAct < activities.length - 1 ? 'Next Activity →' : 'See Results 🎉';
  btn.disabled = false;
  btn.onclick = () => {
    currentAct++;
    currentItem = 0;
    btn.onclick = handleAction;
    renderCurrentActivity();
  };
  updateHeader();
}

function getEncouragement(pct) {
  if (pct >= 90) return '🌟 Outstanding! Keep it up!';
  if (pct >= 70) return '👍 Great work! Well done!';
  if (pct >= 50) return '💪 Good effort! Keep practising.';
  return '📚 Keep going! Practice makes perfect.';
}

// ═══════════════════════════════════════════════════════
// END SCREEN
// ═══════════════════════════════════════════════════════
function renderEndScreen() {
  const earned = getTotalEarned(), max = getTotalMax();
  const pct = max ? Math.round((earned/max)*100) : 0;
  const ca = document.getElementById('content-area');
  ca.scrollTop = 0;

  let breakdownRows = '';
  activities.forEach(act => {
    const s = scores[act.id] || {earned:0,max:0};
    const ap = s.max ? s.earned/s.max : 0;
    const sec = getSectionForActivity(act);
    const name = (sec ? sec.label : '') || act.type.replace(/_/g,' ');
    breakdownRows += `<div class="breakdown-row">
      <div class="breakdown-name">${escHtml(name)}</div>
      <div class="star-rating" title="${s.earned}/${s.max}">${starsFromPct(ap*100)}</div>
    </div>`;
  });

  ca.innerHTML = `<div class="end-screen">
    <div class="end-emoji">🎉</div>
    <div class="end-title">Lesson Complete!</div>
    <div class="end-course">${escHtml(lesson.course.name)}</div>
    <div class="end-total">${earned} / ${max}</div>
    <div class="end-total-label">${pct}% total score</div>
    <div class="score-bar-track" style="margin-bottom:20px"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    <div class="activity-breakdown">
      <div class="breakdown-title">Activity Breakdown</div>
      ${breakdownRows}
    </div>
    <button class="restart-btn" onclick="restartLesson()">Study again 🔄</button>
    <button class="restart-btn" style="background:#fff;color:var(--primary);border:2px solid var(--primary);margin-top:10px" onclick="goHome()">Load new lesson 📂</button>
  </div>`;

  document.getElementById('action-bar').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';
}

function restartLesson() {
  initLesson(lesson);
}

function goHome() {
  lesson = null;
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('progress-track').style.display = 'none';
  document.getElementById('action-bar').style.display = 'none';
  document.getElementById('content-area').innerHTML = '';
  document.getElementById('load-screen').style.display = 'flex';
  document.getElementById('content-area').appendChild(document.getElementById('load-screen'));
  applyTheme('_default');
}

// ═══════════════════════════════════════════════════════
// SETUP INTERACTIONS (post-render)
// ═══════════════════════════════════════════════════════
function setupActivityInteractions(act) {
  // Writing word count update on load
  if (act.type === 'writing_prompt') {
    (act.items||[]).forEach(item => {
      if (item.type !== 'writing') return;
      const ta = document.getElementById('writing-' + item.id);
      if (ta) updateWritingWordCount(item.id, ta);
    });
  }
  // Trigger score bar animation
  setTimeout(() => {
    const fill = document.querySelector('.score-bar-fill');
    if (fill) fill.style.transition = 'width 0.8s cubic-bezier(.4,0,.2,1)';
  }, 100);
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer = null;
function showToast(correct, header, body) {
  const toast = document.getElementById('feedback-toast');
  toast.className = 'show ' + (correct ? 'toast-correct' : 'toast-incorrect');
  document.getElementById('toast-header').textContent = header;
  document.getElementById('toast-body').textContent = body;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = correct ? 'toast-correct' : 'toast-incorrect'; }, 2800);
  toast.onclick = () => { toast.className = correct ? 'toast-correct' : 'toast-incorrect'; };
}

// ═══════════════════════════════════════════════════════
// LOAD SCREEN RESTORE
// ═══════════════════════════════════════════════════════
// Move load-screen into content-area on init
document.getElementById('content-area').appendChild(document.getElementById('load-screen'));
</script>
